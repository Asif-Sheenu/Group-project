name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd ~/Group-project

            git pull origin main

            docker stop pet-api || true
            docker rm pet-api || true

            docker build -t pet-insurance .

            docker run -d \
              --name pet-api \
              -p 8000:8000 \
              pet-insurance